<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Operational systems map</title>
  <desc id="desc">A clean infrastructure map from fragmented business context to coordinated operational execution.</desc>
  <rect width="1200" height="360" fill="#0D1117"/>
  <text x="72" y="68" fill="#F0F6FC" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="720" letter-spacing="0">Operational Systems Map</text>
  <text x="72" y="101" fill="#8B949E" font-family="Inter, Arial, sans-serif" font-size="16" letter-spacing="0">Turning fragmented context into coordinated execution.</text>
  <path d="M72 130H1128" stroke="#30363D"/>
  <g stroke="#30363D" stroke-width="2" stroke-linecap="round">
    <path d="M294 220H386"/>
    <path d="M546 220H638"/>
    <path d="M798 220H890"/>
  </g>
  <g fill="#8B949E">
    <path d="M382 214L394 220L382 226V214Z"/>
    <path d="M634 214L646 220L634 226V214Z"/>
    <path d="M886 214L898 220L886 226V214Z"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <g>
      <rect x="72" y="166" width="222" height="108" rx="8" fill="#161B22" stroke="#30363D"/>
      <text x="96" y="202" fill="#F0F6FC" font-size="21" font-weight="700" letter-spacing="0">Business Inputs</text>
      <text x="96" y="233" fill="#C9D1D9" font-size="14" letter-spacing="0">spreadsheets, teams,</text>
      <text x="96" y="255" fill="#C9D1D9" font-size="14" letter-spacing="0">decisions and signals</text>
    </g>
    <g>
      <rect x="394" y="166" width="222" height="108" rx="8" fill="#161B22" stroke="#30363D"/>
      <text x="418" y="202" fill="#F0F6FC" font-size="21" font-weight="700" letter-spacing="0">Automation Layer</text>
      <text x="418" y="233" fill="#C9D1D9" font-size="14" letter-spacing="0">repeatable workflows,</text>
      <text x="418" y="255" fill="#C9D1D9" font-size="14" letter-spacing="0">routing and state</text>
    </g>
    <g>
      <rect x="646" y="166" width="222" height="108" rx="8" fill="#161B22" stroke="#30363D"/>
      <text x="670" y="202" fill="#F0F6FC" font-size="21" font-weight="700" letter-spacing="0">AI + Memory</text>
      <text x="670" y="233" fill="#C9D1D9" font-size="14" letter-spacing="0">context, analysis,</text>
      <text x="670" y="255" fill="#C9D1D9" font-size="14" letter-spacing="0">coordination and recall</text>
    </g>
    <g>
      <rect x="898" y="166" width="230" height="108" rx="8" fill="#161B22" stroke="#30363D"/>
      <text x="922" y="202" fill="#F0F6FC" font-size="21" font-weight="700" letter-spacing="0">Operational Output</text>
      <text x="922" y="233" fill="#C9D1D9" font-size="14" letter-spacing="0">less manual overhead,</text>
      <text x="922" y="255" fill="#C9D1D9" font-size="14" letter-spacing="0">clearer execution loops</text>
    </g>
  </g>
  <g font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#8B949E">
    <text x="72" y="316">01 / operational visibility</text>
    <text x="360" y="316">02 / decision support</text>
    <text x="622" y="316">03 / orchestration</text>
    <text x="874" y="316">04 / execution systems</text>
  </g>
</svg>
