<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Infrastructure map</title>
  <desc id="desc">A system map showing market inputs flowing through automation, orchestration, AI agents, memory and operational execution.</desc>
  <rect width="1200" height="520" fill="#0D1117"/>
  <g stroke="#1F2937">
    <path d="M100 80H1100"/>
    <path d="M100 180H1100"/>
    <path d="M100 280H1100"/>
    <path d="M100 380H1100"/>
    <path d="M200 40V480"/>
    <path d="M400 40V480"/>
    <path d="M600 40V480"/>
    <path d="M800 40V480"/>
    <path d="M1000 40V480"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="96" y="70" fill="#737373" font-size="14" letter-spacing="0">INPUT LAYER</text>
    <text x="96" y="468" fill="#737373" font-size="14" letter-spacing="0">EXECUTION LAYER</text>
  </g>
  <g stroke="#525252" stroke-width="2" stroke-linecap="round">
    <path d="M262 180H392"/>
    <path d="M502 180H592"/>
    <path d="M722 180H812"/>
    <path d="M910 180C972 180 972 340 910 340"/>
    <path d="M812 340H722"/>
    <path d="M592 340H502"/>
    <path d="M392 340H262"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <g>
      <rect x="90" y="130" width="172" height="100" rx="10" fill="#0A0A0A" stroke="#262626"/>
      <text x="116" y="172" fill="#FAFAFA" font-size="20" font-weight="700" letter-spacing="0">Markets</text>
      <text x="116" y="202" fill="#A3A3A3" font-size="14" letter-spacing="0">signals and demand</text>
    </g>
    <g>
      <rect x="392" y="130" width="172" height="100" rx="10" fill="#0A0A0A" stroke="#262626"/>
      <text x="418" y="172" fill="#FAFAFA" font-size="20" font-weight="700" letter-spacing="0">Automation</text>
      <text x="418" y="202" fill="#A3A3A3" font-size="14" letter-spacing="0">repeatable workflows</text>
    </g>
    <g>
      <rect x="592" y="130" width="172" height="100" rx="10" fill="#0A0A0A" stroke="#262626"/>
      <text x="618" y="172" fill="#FAFAFA" font-size="20" font-weight="700" letter-spacing="0">AI Agents</text>
      <text x="618" y="202" fill="#A3A3A3" font-size="14" letter-spacing="0">analysis and action</text>
    </g>
    <g>
      <rect x="812" y="130" width="206" height="100" rx="10" fill="#0A0A0A" stroke="#262626"/>
      <text x="838" y="172" fill="#FAFAFA" font-size="20" font-weight="700" letter-spacing="0">Orchestration</text>
      <text x="838" y="202" fill="#A3A3A3" font-size="14" letter-spacing="0">routing, state and tasks</text>
    </g>
    <g>
      <rect x="812" y="290" width="206" height="100" rx="10" fill="#0A0A0A" stroke="#262626"/>
      <text x="838" y="332" fill="#FAFAFA" font-size="20" font-weight="700" letter-spacing="0">Memory</text>
      <text x="838" y="362" fill="#A3A3A3" font-size="14" letter-spacing="0">context and continuity</text>
    </g>
    <g>
      <rect x="542" y="290" width="180" height="100" rx="10" fill="#0A0A0A" stroke="#262626"/>
      <text x="568" y="332" fill="#FAFAFA" font-size="20" font-weight="700" letter-spacing="0">Decision Layer</text>
      <text x="568" y="362" fill="#A3A3A3" font-size="14" letter-spacing="0">support and tradeoffs</text>
    </g>
    <g>
      <rect x="90" y="290" width="204" height="100" rx="10" fill="#0A0A0A" stroke="#262626"/>
      <text x="116" y="332" fill="#FAFAFA" font-size="20" font-weight="700" letter-spacing="0">Operations</text>
      <text x="116" y="362" fill="#A3A3A3" font-size="14" letter-spacing="0">less friction, more flow</text>
    </g>
